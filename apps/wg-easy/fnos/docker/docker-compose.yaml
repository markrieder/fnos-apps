services:
  wg-easy:
    image: ${DOCKER_MIRROR}ghcr.io/wg-easy/wg-easy:${VERSION}
    container_name: wg-easy
    ports:
      - "${TRIM_SERVICE_PORT}:51821"
      - "51820:51820/udp"
    volumes:
      - ${TRIM_PKGVAR:?}/config:/etc/wireguard
    environment:
      - TZ=Asia/Shanghai
      - WG_HOST=${WG_HOST:-}
      - PASSWORD_HASH=${PASSWORD_HASH:-}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped

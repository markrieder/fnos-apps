services:
  librechat:
    image: ${DOCKER_MIRROR}ghcr.io/danny-avila/librechat:${VERSION}
    container_name: librechat
    depends_on:
      - librechat-mongo
    ports:
      - "${TRIM_SERVICE_PORT}:3080"
    volumes:
      - ${TRIM_PKGVAR}/config/librechat.yaml:/app/librechat.yaml
      - ${TRIM_PKGVAR}/images:/app/client/public/images
    environment:
      - MONGO_URI=mongodb://librechat-mongo:27017/LibreChat
      - JWT_SECRET=fnos-librechat-secret-change-me
      - CREDS_KEY=fnos-librechat-creds-key-32chars
      - CREDS_IV=fnos-librechat-creds-iv-16ch
    restart: unless-stopped

  librechat-mongo:
    image: ${DOCKER_MIRROR}docker.io/mongo:7
    container_name: librechat-mongo
    volumes:
      - ${TRIM_PKGVAR}/db:/data/db
    restart: unless-stopped

services:
  frigate:
    image: ${DOCKER_MIRROR}ghcr.io/blakeblackshear/frigate:${VERSION}
    container_name: frigate
    ports:
      - "${TRIM_SERVICE_PORT}:8971"
      - "8554:8554/tcp"
      - "1935:1935/tcp"
    volumes:
      - ${TRIM_PKGVAR:?}/config:/config
      - ${TRIM_PKGVAR:?}/media:/media/frigate
    environment:
      - TZ=Asia/Shanghai
    devices:
      - /dev/dri:/dev/dri
    shm_size: "256mb"
    restart: unless-stopped

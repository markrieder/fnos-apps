services:
  medusa:
    image: ${DOCKER_MIRROR}docker.io/linuxserver/medusa:${VERSION}
    container_name: medusa
    ports:
      - "${TRIM_SERVICE_PORT}:8081"
    volumes:
      - ${TRIM_PKGVAR}/config:/config
      - ${TRIM_PKGVAR}/downloads:/downloads
      - ${TRIM_PKGVAR}/tv:/tv
    environment:
      - TZ=Asia/Shanghai
      - PUID=1000
      - PGID=1000
    restart: unless-stopped

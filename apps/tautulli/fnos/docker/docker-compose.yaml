services:
  tautulli:
    image: ${DOCKER_MIRROR}docker.io/linuxserver/tautulli:${VERSION}
    container_name: tautulli
    ports:
      - "${TRIM_SERVICE_PORT}:8181"
    volumes:
      - ${TRIM_PKGVAR}/config:/config
    environment:
      - TZ=Asia/Shanghai
      - PUID=${TRIM_UID}
      - PGID=${TRIM_GID}
    restart: unless-stopped

services:
  reactive-resume:
    image: ${DOCKER_MIRROR}docker.io/amruthpillai/reactive-resume:${VERSION}
    container_name: reactive-resume
    depends_on:
      - reactive-resume-db
      - reactive-resume-chrome
    ports:
      - "${TRIM_SERVICE_PORT}:3000"
    volumes:
      - ${TRIM_PKGVAR}/data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - PUBLIC_URL=http://localhost:3200
      - SECRET_KEY=fnos-resume-secret
      - DATABASE_URL=postgresql://reactive_resume:password@reactive-resume-db:5432/reactive_resume
      - CHROME_URL=http://reactive-resume-chrome:3000
    restart: unless-stopped

  reactive-resume-db:
    image: ${DOCKER_MIRROR}docker.io/postgres:16
    container_name: reactive-resume-db
    environment:
      - POSTGRES_USER=reactive_resume
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=reactive_resume
      - TZ=Asia/Shanghai
    volumes:
      - ${TRIM_PKGVAR}/db:/var/lib/postgresql/data
    restart: unless-stopped

  reactive-resume-chrome:
    image: ${DOCKER_MIRROR}ghcr.io/browserless/chromium:latest
    container_name: reactive-resume-chrome
    environment:
      - TZ=Asia/Shanghai
      - TOKEN=fnos-reactive-resume
      - CONCURRENT=2
      - TIMEOUT=60000
    volumes:
      - ${TRIM_PKGVAR}/chrome:/data
    restart: unless-stopped

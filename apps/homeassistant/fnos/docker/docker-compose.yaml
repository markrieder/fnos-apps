services:
  homeassistant:
    image: ${DOCKER_MIRROR}lscr.io/linuxserver/homeassistant:${VERSION}
    container_name: homeassistant
    network_mode: host
    privileged: true
    volumes:
      - ${TRIM_PKGVAR}/config:/config
    environment:
      - TZ=Asia/Shanghai
      - PUID=${TRIM_UID}
      - PGID=${TRIM_GID}
    restart: unless-stopped

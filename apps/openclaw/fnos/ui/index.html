<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw AI 网关</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe8e0 50%, #fff0e6 100%);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 1.5rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff7043 0%, #f4511e 50%, #ff8a65 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #999;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1.5rem;
            border-radius: 999px;
            background: rgba(244, 81, 30, 0.08);
            border: 1px solid rgba(244, 81, 30, 0.25);
            font-size: 0.9rem;
            color: #f4511e;
            animation: pulse 2s infinite;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f4511e;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .info {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
    <script src="token.js"></script>
    <script>
        // 尝试连接 OpenClaw Gateway，成功则自动跳转
        (function() {
            var port = '18789';
            var host = window.location.hostname;
            var token = window.__OPENCLAW_TOKEN__ || '';

            // 如果 token.js 没加载到，尝试从当前 URL 参数获取
            if (!token) {
                var params = new URLSearchParams(window.location.search);
                token = params.get('token') || '';
            }

            var tokenParam = token ? '?token=' + token : '';
            var url = 'http://' + host + ':' + port + '/' + tokenParam;

            // 如果当前已经是正确的端口，不做跳转
            if (window.location.port === port) return;

            fetch(url, { mode: 'no-cors', cache: 'no-cache' })
                .then(function() {
                    window.location.href = url;
                })
                .catch(function() {
                    // Gateway 未就绪，保持当前页面
                });
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg5" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff7043"/>
                        <stop offset="100%" style="stop-color:#f4511e"/>
                    </linearGradient>
                </defs>
                <rect width="256" height="256" rx="44" fill="url(#bg5)"/>
                <!-- 身体 -->
                <ellipse cx="128" cy="130" rx="55" ry="42" fill="white"/>
                <!-- 左钳臂 -->
                <rect x="48" y="95" width="35" height="14" rx="7" fill="white" transform="rotate(-25,65,102)"/>
                <ellipse cx="42" cy="72" rx="20" ry="14" fill="white" transform="rotate(-15,42,72)"/>
                <ellipse cx="52" cy="60" rx="16" ry="11" fill="white" transform="rotate(20,52,60)"/>
                <path d="M35 72 L50 65" stroke="#f4511e" stroke-width="3" stroke-linecap="round"/>
                <!-- 右钳臂 -->
                <rect x="173" y="95" width="35" height="14" rx="7" fill="white" transform="rotate(25,191,102)"/>
                <ellipse cx="214" cy="72" rx="20" ry="14" fill="white" transform="rotate(15,214,72)"/>
                <ellipse cx="204" cy="60" rx="16" ry="11" fill="white" transform="rotate(-20,204,60)"/>
                <path d="M221 72 L206 65" stroke="#f4511e" stroke-width="3" stroke-linecap="round"/>
                <!-- 眼柄+眼睛 -->
                <rect x="100" y="82" width="8" height="18" rx="4" fill="white"/>
                <rect x="148" y="82" width="8" height="18" rx="4" fill="white"/>
                <circle cx="104" cy="80" r="10" fill="white"/>
                <circle cx="152" cy="80" r="10" fill="white"/>
                <circle cx="104" cy="80" r="6" fill="#f4511e"/>
                <circle cx="152" cy="80" r="6" fill="#f4511e"/>
                <circle cx="106" cy="78" r="2.5" fill="white"/>
                <circle cx="154" cy="78" r="2.5" fill="white"/>
                <!-- 嘴巴 -->
                <path d="M115 140 Q128 152, 141 140" stroke="#f4511e" stroke-width="3" fill="none" stroke-linecap="round"/>
                <!-- 腿 -->
                <rect x="55" y="148" width="30" height="8" rx="4" fill="white" transform="rotate(35,70,152)"/>
                <rect x="50" y="160" width="30" height="8" rx="4" fill="white" transform="rotate(50,65,164)"/>
                <rect x="48" y="172" width="28" height="8" rx="4" fill="white" transform="rotate(65,62,176)"/>
                <rect x="171" y="148" width="30" height="8" rx="4" fill="white" transform="rotate(-35,186,152)"/>
                <rect x="176" y="160" width="30" height="8" rx="4" fill="white" transform="rotate(-50,191,164)"/>
                <rect x="180" y="172" width="28" height="8" rx="4" fill="white" transform="rotate(-65,194,176)"/>
                <!-- AI 标记 -->
                <rect x="113" y="118" width="30" height="16" rx="4" fill="#f4511e" opacity="0.8"/>
                <text x="128" y="131" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-size="11" font-weight="bold">AI</text>
            </svg>
        </div>
        <h1>OpenClaw AI</h1>
        <p class="subtitle">AI 智能体 Gateway 网关</p>
        <div class="status">
            <span class="dot"></span>
            <span>正在连接 Gateway...</span>
        </div>
        <p class="info">如果页面未自动跳转，请确认 OpenClaw 服务已启动</p>
    </div>
</body>
</html>

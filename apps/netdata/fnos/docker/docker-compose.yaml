services:
  netdata:
    image: ${DOCKER_MIRROR}docker.io/netdata/netdata:v${VERSION}
    container_name: netdata
    ports:
      - "${TRIM_SERVICE_PORT}:19999"
    volumes:
      - ${TRIM_PKGVAR:?}/data:/etc/netdata
      - ${TRIM_PKGVAR:?}/lib:/var/lib/netdata
      - ${TRIM_PKGVAR:?}/cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/localtime:/etc/localtime:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=Asia/Shanghai
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    restart: unless-stopped

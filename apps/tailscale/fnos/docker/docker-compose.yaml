services:
  tailscale:
    image: ${DOCKER_MIRROR}docker.io/tailscale/tailscale:v${VERSION}
    container_name: tailscale
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ${TRIM_PKGVAR}/data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_AUTH_ONCE=true
      - TZ=Asia/Shanghai
    restart: unless-stopped
